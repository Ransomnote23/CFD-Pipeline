<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>SCP Pipeline</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#0f1117;--surface:#181c27;--surface2:#1e2333;--border:#2a2f42;--border2:#343a52;--text:#e8eaf0;--text2:#8b90a7;--text3:#555b73;--accent:#4f7cff;--accent-dim:#1e2d5a;--green:#22c97a;--green-dim:#0d2e1e;--amber:#f5a623;--amber-dim:#2e2006;--red:#ff4d6a;--red-dim:#2e0d14;--mono:'DM Mono',monospace;--sans:'DM Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.5;}
.app{display:grid;grid-template-rows:56px 1fr;height:100vh;overflow:hidden;}
.topbar{background:var(--surface);border-bottom:1px solid var(--border);display:flex;align-items:center;padding:0 24px;gap:16px;flex-shrink:0;}
.topbar-logo{font-family:var(--mono);font-size:13px;font-weight:500;letter-spacing:.08em;}
.topbar-logo span{color:var(--accent);}
.topbar-spacer{flex:1;}
.topbar-meta{font-size:12px;color:var(--text3);font-family:var(--mono);}
.db-status{font-size:11px;font-family:var(--mono);padding:3px 10px;border-radius:4px;}
.db-status.ok{background:var(--green-dim);color:var(--green);}
.db-status.err{background:var(--red-dim);color:var(--red);}
.db-status.loading{background:var(--accent-dim);color:var(--accent);}
.main{display:grid;grid-template-columns:220px 1fr;overflow:hidden;}
.sidebar{background:var(--surface);border-right:1px solid var(--border);padding:16px 0;overflow-y:auto;display:flex;flex-direction:column;gap:2px;}
.sidebar-section{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:12px 16px 6px;}
.sidebar-item{display:flex;align-items:center;gap:10px;padding:7px 16px;cursor:pointer;transition:background .12s;font-size:13px;color:var(--text2);border-left:2px solid transparent;}
.sidebar-item:hover{background:var(--surface2);color:var(--text);}
.sidebar-item.active{background:var(--accent-dim);color:var(--accent);border-left-color:var(--accent);}
.sidebar-item .dot{width:7px;height:7px;border-radius:50%;background:var(--border2);flex-shrink:0;}
.sidebar-item.active .dot,.sidebar-item:hover .dot{background:currentColor;}
.content{overflow-y:auto;padding:24px;}
.metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px;}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:14px 16px;}
.metric-label{font-size:11px;color:var(--text3);font-family:var(--mono);letter-spacing:.04em;margin-bottom:6px;}
.metric-value{font-size:22px;font-weight:600;font-family:var(--mono);}
.metric-value.green{color:var(--green);}
.metric-value.amber{color:var(--amber);}
.metric-value.red{color:var(--red);}
.metric-sub{font-size:11px;color:var(--text3);margin-top:3px;}
.toolbar{display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap;align-items:center;}
.search-wrap{position:relative;flex:1;min-width:200px;}
.search-wrap input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px 7px 32px;font-family:var(--sans);font-size:13px;outline:none;transition:border .15s;}
.search-wrap input:focus{border-color:var(--accent);}
.search-wrap input::placeholder{color:var(--text3);}
.search-icon{position:absolute;left:10px;top:50%;transform:translateY(-50%);color:var(--text3);}
select{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-family:var(--sans);font-size:13px;outline:none;cursor:pointer;}
select:focus{border-color:var(--accent);}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:7px 14px;font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .12s;white-space:nowrap;}
.btn:hover:not(:disabled){border-color:var(--border2);color:var(--text);}
.btn:disabled{opacity:.5;cursor:not-allowed;}
.btn-primary{background:var(--accent);border-color:var(--accent);color:#fff;}
.btn-primary:hover:not(:disabled){background:#3d6aee;color:#fff;}
.btn-danger{color:var(--red);border-color:transparent;background:transparent;padding:4px 8px;font-size:12px;}
.btn-danger:hover:not(:disabled){background:var(--red-dim);border-color:var(--red);}
.btn-xs{font-size:11px;padding:3px 8px;}
.btn-ghost{background:transparent;border:none;color:var(--accent);font-size:12px;padding:0;cursor:pointer;font-family:var(--sans);}
.section-divider{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:8px 0 6px;border-bottom:1px solid var(--border);margin-bottom:8px;display:flex;align-items:center;gap:8px;}
.divider-badge{background:var(--red-dim);color:var(--red);border-radius:4px;padding:1px 6px;font-size:10px;}
.labor-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px;}
.labor-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:20px;}
.labor-table-title{font-size:12px;font-weight:600;color:var(--text2);padding:12px 14px 0;}
.labor-table-sub{font-size:11px;color:var(--text3);padding:2px 14px 8px;border-bottom:1px solid var(--border);}
.lt-header{display:grid;padding:8px 14px;background:var(--surface2);font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
.lt-row{display:grid;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;font-family:var(--mono);align-items:center;}
.lt-row:last-child{border-bottom:none;}
.lt-row.total-row{background:var(--surface2);font-weight:500;}
.lt-row.warn{background:var(--amber-dim);}
.lt-row.over{background:var(--red-dim);}
.lt-val{text-align:right;}
.lt-val.green{color:var(--green);}
.lt-val.amber{color:var(--amber);}
.lt-val.red{color:var(--red);}
.eff-bar{height:6px;background:var(--border);border-radius:3px;overflow:hidden;min-width:60px;display:inline-block;vertical-align:middle;}
.eff-fill{height:100%;border-radius:3px;}
.log-grid{display:grid;gap:8px;}
.log-row{display:grid;grid-template-columns:1fr 1fr 100px 100px 80px;gap:8px;align-items:center;padding:8px 0;border-bottom:0.5px solid var(--border);}
.log-row:last-child{border-bottom:none;}
.month-picker{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:12px;outline:none;width:100%;}
.month-picker:focus{border-color:var(--accent);}
.po-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;margin-bottom:8px;overflow:hidden;}
.po-card.overdue{border-color:var(--red);border-left:3px solid var(--red);}
.po-header{display:grid;grid-template-columns:28px minmax(0,2fr) minmax(0,1.6fr) 100px 100px 100px 100px 80px 80px 110px 80px;gap:8px;align-items:center;padding:10px 14px;cursor:pointer;user-select:none;}
.po-header:hover{background:rgba(255,255,255,.02);}
.chevron{color:var(--text3);font-size:10px;transition:transform .15s;}
.chevron.open{transform:rotate(90deg);}
.po-customer{font-weight:500;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.po-meta{font-size:11px;color:var(--text3);font-family:var(--mono);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:2px;}
.po-lines-info{font-size:11px;color:var(--text3);}
.prog-wrap{display:flex;align-items:center;gap:6px;margin-top:3px;}
.prog-bar{height:4px;background:var(--border);border-radius:2px;flex:1;overflow:hidden;}
.prog-fill{height:100%;border-radius:2px;transition:width .3s;}
.prog-pct{font-size:10px;color:var(--text3);font-family:var(--mono);white-space:nowrap;}
.col-val{text-align:right;}
.col-label{font-size:10px;color:var(--text3);font-family:var(--mono);}
.col-num{font-size:13px;font-weight:500;font-family:var(--mono);}
.col-num.amber{color:var(--amber);}
.col-num.green{color:var(--green);}
.badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:4px;font-weight:500;font-family:var(--mono);white-space:nowrap;}
.badge.open{background:var(--accent-dim);color:var(--accent);}
.badge.partial{background:var(--amber-dim);color:var(--amber);}
.badge.complete{background:var(--green-dim);color:var(--green);}
.badge.invoiced{background:var(--surface2);color:var(--text3);}
.badge.overdue{background:var(--red-dim);color:var(--red);}
.po-detail{border-top:1px solid var(--border);background:var(--surface2);padding:12px 14px 12px 42px;}
.detail-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:end;}
.field-group{display:flex;flex-direction:column;gap:4px;}
.field-label{font-size:10px;color:var(--text3);font-family:var(--mono);letter-spacing:.06em;text-transform:uppercase;}
.field-input{background:var(--surface);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 8px;font-family:var(--mono);font-size:12px;outline:none;transition:border .15s;width:100%;}
.field-input:focus{border-color:var(--accent);}
.field-input::placeholder{color:var(--text3);}
.chk-label{display:flex;align-items:center;gap:6px;font-size:12px;color:var(--text2);cursor:pointer;}
.chk-label input{accent-color:var(--accent);width:13px;height:13px;}
.saved-msg{font-size:11px;color:var(--green);font-family:var(--mono);margin-left:8px;opacity:0;transition:opacity .3s;}
.lines-section{border-top:1px solid var(--border);padding:0 14px 12px 42px;}
.lines-header{display:grid;grid-template-columns:1fr 70px 80px 80px 80px 90px 90px 110px 90px;gap:8px;padding:8px 0 4px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.lines-header span{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;}
.lines-header span:not(:first-child){text-align:right;}
.line-row{display:grid;grid-template-columns:1fr 70px 80px 80px 80px 90px 90px 110px 90px;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);align-items:center;}
.line-row:last-child{border-bottom:none;}
.line-desc{font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.line-num{font-size:12px;font-family:var(--mono);text-align:right;color:var(--text2);}
.line-actions{display:flex;gap:4px;justify-content:flex-end;}
.shipments{grid-column:1/-1;background:var(--bg);border-radius:5px;padding:8px 10px;margin-top:4px;}
.ship-header{display:grid;grid-template-columns:110px 70px 90px 1fr 90px;gap:8px;padding-bottom:4px;border-bottom:1px solid var(--border);margin-bottom:4px;}
.ship-header span{font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;}
.ship-row{display:grid;grid-template-columns:110px 70px 90px 1fr 90px;gap:8px;align-items:center;padding:3px 0;font-size:12px;font-family:var(--mono);}
.ship-inv{background:transparent;border:none;border-bottom:1px solid var(--border);color:var(--text);font-family:var(--mono);font-size:12px;padding:1px 4px;width:100%;outline:none;}
.ship-inv:focus{border-bottom-color:var(--accent);}
.ship-inv::placeholder{color:var(--text3);}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px;}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:10px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;}
.modal-title{font-size:15px;font-weight:600;margin-bottom:16px;}
.modal-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px;}
.modal-grid .full{grid-column:1/-1;}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:4px;}
.modal input,.modal select{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 10px;font-family:var(--sans);font-size:13px;outline:none;width:100%;transition:border .15s;}
.modal input:focus,.modal select:focus{border-color:var(--accent);}
.modal input::placeholder{color:var(--text3);}
.modal-note{font-size:12px;color:var(--text3);margin-bottom:12px;line-height:1.5;}
.empty{text-align:center;padding:48px 24px;color:var(--text3);}
.empty-title{font-size:15px;color:var(--text2);margin-bottom:8px;}
.proj-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px;}
.proj-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.proj-table-header{display:grid;padding:10px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.06em;}
.proj-table-row{display:grid;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;font-family:var(--mono);align-items:center;}
.proj-table-row:last-child{border-bottom:none;}
.proj-table-row.total-row{background:var(--surface2);font-weight:500;}
.proj-5col{grid-template-columns:1.4fr 1fr 1fr 1fr 1fr;}
.proj-val{text-align:right;}
.proj-val.green{color:var(--green);}
.proj-val.amber{color:var(--amber);}
.settings-card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px;margin-bottom:16px;}
.settings-card h3{font-size:13px;font-weight:600;margin-bottom:14px;color:var(--text);}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:8px 0;border-bottom:1px solid var(--border);gap:12px;}
.settings-row:last-child{border-bottom:none;}
.settings-label{font-size:13px;color:var(--text2);flex-shrink:0;}
.settings-input{background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:5px;padding:5px 10px;font-family:var(--mono);font-size:12px;outline:none;width:220px;}
.settings-input:focus{border-color:var(--accent);}
.migrate-box{background:var(--accent-dim);border:1px solid var(--accent);border-radius:8px;padding:20px;margin-bottom:16px;}
.migrate-box h3{color:var(--accent);font-size:14px;margin-bottom:8px;}
.migrate-box p{font-size:13px;color:var(--text2);margin-bottom:12px;line-height:1.6;}
.inv-metrics{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:20px;}
.inv-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;align-items:center;}
.inv-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.inv-header{display:grid;grid-template-columns:120px 1fr 100px 100px 110px 110px 120px 100px 80px;gap:8px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;letter-spacing:.04em;}
.inv-row{display:grid;grid-template-columns:120px 1fr 100px 100px 110px 110px 120px 100px 80px;gap:8px;padding:10px 14px;border-bottom:1px solid var(--border);font-size:12px;align-items:center;}
.inv-row:last-child{border-bottom:none;}
.inv-row:hover{background:rgba(255,255,255,.02);}
.inv-row.paid-row{opacity:.65;}
.inv-num{font-family:var(--mono);font-weight:500;color:var(--accent);}
.inv-amt{font-family:var(--mono);font-weight:500;text-align:right;}
.inv-date{font-family:var(--mono);font-size:11px;color:var(--text2);}
.inv-overdue{color:var(--red)!important;}
.pay-chk{width:15px;height:15px;accent-color:var(--green);cursor:pointer;}
.month-group{font-size:11px;font-weight:600;color:var(--text3);letter-spacing:.1em;text-transform:uppercase;padding:8px 14px 6px;display:flex;justify-content:space-between;align-items:center;background:var(--surface2);border-bottom:1px solid var(--border);}
.month-summary{font-family:var(--mono);font-size:11px;}
.week-label{font-size:10px;color:var(--text3);font-family:var(--mono);padding:4px 14px;background:rgba(255,255,255,.015);border-bottom:0.5px solid var(--border);}
.ar-banner{background:var(--red-dim);border:1px solid var(--red);border-radius:8px;padding:12px 16px;margin-bottom:16px;display:flex;align-items:center;justify-content:space-between;}
.ar-banner-text{font-size:13px;color:var(--red);}
.ar-banner-amount{font-family:var(--mono);font-size:18px;font-weight:600;color:var(--red);}
.inv-monthly-table{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;margin-bottom:16px;}
.imt-header{display:grid;grid-template-columns:1.2fr 80px 100px 100px 100px 100px;gap:8px;padding:9px 14px;background:var(--surface2);border-bottom:1px solid var(--border);font-size:10px;color:var(--text3);font-family:var(--mono);text-transform:uppercase;}
.imt-row{display:grid;grid-template-columns:1.2fr 80px 100px 100px 100px 100px;gap:8px;padding:9px 14px;border-bottom:1px solid var(--border);font-size:12px;font-family:var(--mono);align-items:center;}
.imt-row:last-child{border-bottom:none;}
.imt-row.total-row{background:var(--surface2);font-weight:500;}
.imt-val{text-align:right;}
@keyframes spin{to{transform:rotate(360deg);}}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div class="topbar-logo"><span>◆</span> SCP Pipeline</div>
    <div class="topbar-spacer"></div>
    <span class="db-status loading" id="db-status">Connecting...</span>
    <div class="topbar-meta" id="topbar-date"></div>
  </div>
  <div class="main">
    <div class="sidebar">
      <div class="sidebar-section">Views</div>
      <div class="sidebar-item active" onclick="setTab('pipeline',this)"><div class="dot"></div>Pipeline</div>
      <div class="sidebar-item" onclick="setTab('projections',this)"><div class="dot"></div>Projections</div>
      <div class="sidebar-item" onclick="setTab('labor',this)"><div class="dot"></div>Labor</div>
      <div class="sidebar-item" onclick="setTab('invoices',this)"><div class="dot"></div>Invoices</div>
      <div class="sidebar-section">Tools</div>
      <div class="sidebar-item" onclick="exportCSV()"><div class="dot"></div>Export pipeline CSV</div>
      <div class="sidebar-item" onclick="document.getElementById('import-csv-file').click()"><div class="dot"></div>Import POs from CSV</div>
      <input type="file" id="import-csv-file" accept=".csv" style="display:none" onchange="importCSV(event)"/>
      <div class="sidebar-item" onclick="document.getElementById('import-inv-file').click()"><div class="dot"></div>Import invoices from CSV</div>
      <input type="file" id="import-inv-file" accept=".csv" style="display:none" onchange="importInvoiceCSV(event)"/>
      <div class="sidebar-item" onclick="downloadInvoiceTemplate()"><div class="dot"></div>Invoice CSV template</div>
      <div class="sidebar-section">Config</div>
      <div class="sidebar-item" onclick="setTab('lists',this)"><div class="dot"></div>Customers &amp; SKUs</div>
      <div class="sidebar-item" onclick="setTab('settings',this)"><div class="dot"></div>Settings</div>
    </div>
    <div class="content" id="content">
      <div class="empty"><div class="empty-title">Connecting to database...</div></div>
    </div>
  </div>
</div>
<div id="modal-area"></div>
<script>
// ── Supabase setup ─────────────────────────────────────────────
const SUPA_URL='https://ovndjtazfzagnrtjjirg.supabase.co';
const SUPA_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im92bmRqdGF6ZnphZ25ydGpqaXJnIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc2NjYzMDAsImV4cCI6MjA5MzI0MjMwMH0.KXXV9HEIF-uVJ7Y_dw8G8kzCX0XiAsFX4kjGXRjlRo0';
const sb=supabase.createClient(SUPA_URL,SUPA_KEY);

// ── App state ──────────────────────────────────────────────────
let pos=[],customers=[],skus=[],employees=[],laborLogs=[],invoices=[];
let settings={companyName:'Small Car Performance',divisionName:'Electrical Manufacturing Division',preparedBy:'',monthlyTarget:0,laborCapacity:320};
let expanded={},currentTab='pipeline';
let filterStatus='',filterCustomer='',filterInherited='',searchQ='';
let _addPoId='',_addLineId='';

// ── Status indicator ───────────────────────────────────────────
function setStatus(state,text){
  const el=document.getElementById('db-status');
  if(el){el.textContent=text;el.className='db-status '+state;}
}

// ── Load all data ──────────────────────────────────────────────
async function dbLoad(){
  setStatus('loading','Loading...');
  try{
    const [posRes,lineRes,shipRes,custRes,skuRes,setRes,empRes,logRes,invRes]=await Promise.all([
      sb.from('pos').select('*').order('created_at'),
      sb.from('line_items').select('*').order('sort_order'),
      sb.from('shipments').select('*').order('created_at'),
      sb.from('customers').select('*').order('name'),
      sb.from('skus').select('*').order('description'),
      sb.from('settings').select('*').eq('id',1).single(),
      sb.from('employees').select('*').order('name'),
      sb.from('labor_logs').select('*').order('month'),
      sb.from('invoices').select('*').order('issue_date',{ascending:false}),
    ]);
    if(posRes.error) throw posRes.error;

    // Build lookup maps
    const lineMap={};
    (lineRes.data||[]).forEach(l=>{
      if(!lineMap[l.po_id]) lineMap[l.po_id]=[];
      lineMap[l.po_id].push(l);
    });
    const shipMap={};
    (shipRes.data||[]).forEach(s=>{
      const k=s.po_id+'|'+s.line_id;
      if(!shipMap[k]) shipMap[k]=[];
      shipMap[k].push(s);
    });

    pos=(posRes.data||[]).map(p=>({
      id:p.id,customer:p.customer,cpo:p.cpo,
      rcvd:p.rcvd||'',due:p.due||'',commitDate:p.commit_date||'',
      so:p.so||'',wo:p.wo||'',cin7:!!p.cin7,fb:!!p.fb,
      inherited:!!p.inherited,notes:p.notes||'',
      lines:(lineMap[p.id]||[]).map(l=>({
        id:l.id,desc:l.description,qty:Number(l.qty),
        unit:l.unit,unitPrice:Number(l.unit_price),
        shipped:(shipMap[p.id+'|'+l.id]||[]).map(s=>({
          _id:s.id,date:s.ship_date||'',qty:Number(s.qty),inv:s.inv||''
        }))
      }))
    }));

    customers=(custRes.data||[]).map(c=>({name:c.name}));
    skus=(skuRes.data||[]).map(s=>({desc:s.description,unit:s.unit,unitPrice:Number(s.unit_price),laborHours:Number(s.labor_hours||0)}));
    employees=(empRes.data||[]).map(e=>({id:e.id,name:e.name,role:e.role||'',active:e.active!==false}));
    laborLogs=(logRes.data||[]).map(l=>({id:l.id,employeeId:l.employee_id,month:l.month,hours:Number(l.hours),notes:l.notes||''}));
    invoices=(invRes.data||[]).map(mapInvoice);
    if(setRes.data){
      const d=setRes.data;
      settings={companyName:d.company_name,divisionName:d.division_name,preparedBy:d.prepared_by,monthlyTarget:Number(d.monthly_target),laborCapacity:Number(d.labor_capacity)};
    }
    setStatus('ok','● Live');
    renderContent();
  }catch(err){
    console.error(err);
    setStatus('err','✕ DB Error');
    document.getElementById('content').innerHTML=`<div class="empty"><div class="empty-title" style="color:var(--red)">Connection failed</div><div style="font-size:12px;margin-top:8px;">${err.message}</div></div>`;
  }
}

// Auto-create or update invoice when a shipment gets an invoice number
async function autoUpsertInvoice(poId,shipment){
  const invNum=shipment.inv.trim();
  if(!invNum) return; // no invoice number, nothing to do
  const po=pos.find(p=>p.id===poId);
  if(!po) return;
  // Calculate amount: sum all shipments on this PO that share this invoice number
  let amount=0;
  po.lines.forEach(l=>{
    l.shipped.forEach(sh=>{
      if(sh.inv===invNum) amount+=sh.qty*l.unitPrice;
    });
  });
  // Also look across all POs in case invoice spans multiple
  const existing=invoices.find(i=>i.invoiceNumber===invNum);
  // Determine due date based on PO terms (default Net 30)
  const issueDate=shipment.date||new Date().toISOString().slice(0,10);
  const due=new Date(issueDate);
  due.setDate(due.getDate()+30);
  const inv={
    id:existing?.id,
    invoiceNumber:invNum,
    customer:po.customer,
    poId:po.id,
    soNumber:po.so||'',
    issueDate,
    dueDate:due.toISOString().slice(0,10),
    amount,
    notes:'',
    paid:existing?.paid||false,
    paidDate:existing?.paidDate||'',
    paidAmount:existing?.paidAmount||null,
    paidNotes:existing?.paidNotes||''
  };
  const saved=await dbSaveInvoice(inv);
  if(existing){
    Object.assign(existing,mapInvoice(saved));
  } else {
    invoices.unshift(mapInvoice(saved));
  }
}

// ── Sync lists from new PO data ────────────────────────────────
async function syncListsFromPos(newPosList){
  for(const po of newPosList){
    if(po.customer&&!customers.find(c=>c.name===po.customer)){
      await dbSaveCustomer(po.customer);
      customers.push({name:po.customer});
    }
    for(const l of(po.lines||[])){
      if(!l.desc)continue;
      if(!skus.find(s=>s.desc===l.desc)){
        const sku={desc:l.desc,unit:l.unit||'ea',unitPrice:l.unitPrice||0,laborHours:l.laborHours||0};
        await dbSaveSku(sku);
        skus.push(sku);
      }
    }
  }
  customers.sort((a,b)=>a.name.localeCompare(b.name));
}

// ── Calculations ───────────────────────────────────────────────
const fmt=n=>'$'+Math.round(n).toLocaleString();
const poValue=po=>po.lines.reduce((s,l)=>s+l.qty*l.unitPrice,0);
const lineValue=l=>l.qty*l.unitPrice;
const lineShippedQty=l=>l.shipped.reduce((s,sh)=>s+sh.qty,0);
const lineOpenQty=l=>l.qty-lineShippedQty(l);
const lineShippedVal=l=>l.shipped.reduce((s,sh)=>s+sh.qty*l.unitPrice,0);
const lineInvoicedVal=l=>l.shipped.filter(s=>s.inv).reduce((s,sh)=>s+sh.qty*l.unitPrice,0);
const poShipped=po=>po.lines.reduce((s,l)=>s+lineShippedVal(l),0);
const poInvoiced=po=>po.lines.reduce((s,l)=>s+lineInvoicedVal(l),0);
const poOpen=po=>poValue(po)-poShipped(po);
const poPct=po=>{const v=poValue(po);return v>0?Math.round(poShipped(po)/v*100):0;};
function isOverdue(po){
  if(!po.due)return false;
  const t=new Date();t.setHours(0,0,0,0);
  return new Date(po.due)<t&&poPct(po)<100;
}
function poStatus(po){
  const p=poPct(po);
  if(p===100&&po.lines.every(l=>l.shipped.every(s=>s.inv)&&lineOpenQty(l)===0))return'invoiced';
  if(p===100)return'complete';
  if(isOverdue(po))return'overdue';
  if(p>0)return'partial';
  return'open';
}
function lineStatus(l){
  if(lineOpenQty(l)===0)return l.shipped.every(s=>s.inv)?'invoiced':'complete';
  return lineShippedQty(l)>0?'partial':'open';
}
function progBar(p){
  const c=p===100?'var(--green)':p>0?'var(--amber)':'var(--border2)';
  return`<div class="prog-bar"><div class="prog-fill" style="width:${p}%;background:${c};"></div></div>`;
}

// ── Pipeline ───────────────────────────────────────────────────
function renderPipeline(){
  const totalVal=pos.reduce((s,p)=>s+poValue(p),0);
  const shipped=pos.reduce((s,p)=>s+poShipped(p),0);
  // Use invoices table as source of truth for invoiced amount
  const invoiced=invoices.reduce((s,i)=>s+i.amount,0);
  const open=totalVal-invoiced;
  const inherited=pos.filter(p=>p.inherited).length;
  const inheritedOpen=pos.filter(p=>p.inherited&&poStatus(p)!=='invoiced'&&poStatus(p)!=='complete').length;
  const custs=[...new Set(pos.map(p=>p.customer))].sort();
  const custOpts=custs.map(c=>`<option value="${c}"${filterCustomer===c?' selected':''}>${c}</option>`).join('');
  const filtered=pos.filter(po=>{
    return(!searchQ||(po.customer+po.cpo+po.id+po.so+po.wo+po.lines.map(l=>l.desc).join(' ')).toLowerCase().includes(searchQ))
      &&(!filterStatus||poStatus(po)===filterStatus)
      &&(!filterCustomer||po.customer===filterCustomer)
      &&(filterInherited===''||(filterInherited==='inherited'?po.inherited:!po.inherited));
  });
  const overduePos=filtered.filter(p=>isOverdue(p));
  const restPos=filtered.filter(p=>!isOverdue(p));
  let cards='';
  if(overduePos.length){
    cards+=`<div class="section-divider">&#9888; Overdue <span class="divider-badge">${overduePos.length}</span></div>`;
    cards+=overduePos.map(poCard).join('');
  }
  if(restPos.length){
    if(overduePos.length) cards+=`<div class="section-divider" style="margin-top:16px;">Active orders</div>`;
    cards+=restPos.map(poCard).join('');
  }
  if(!filtered.length) cards=`<div class="empty"><div class="empty-title">No orders match your filters</div></div>`;
  document.getElementById('content').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="metric-label">Total PO value</div><div class="metric-value">${fmt(totalVal)}</div></div>
      <div class="metric"><div class="metric-label">Shipped (open invoice)</div><div class="metric-value amber">${fmt(shipped)}</div></div>
      <div class="metric"><div class="metric-label">Invoiced</div><div class="metric-value green">${fmt(invoiced)}</div></div>
      <div class="metric"><div class="metric-label">Open remaining</div><div class="metric-value">${fmt(open)}</div></div>
      <div class="metric"><div class="metric-label">Inherited backlog open</div><div class="metric-value${inheritedOpen>0?' amber':' green'}">${inheritedOpen} <span style="font-size:13px;font-weight:400">of ${inherited}</span></div></div>
    </div>
    <div class="toolbar">
      <div class="search-wrap"><span class="search-icon">&#9906;</span><input type="text" placeholder="Search customer, PO#, part..." value="${searchQ}" oninput="searchQ=this.value;renderPipeline()"/></div>
      <select onchange="filterStatus=this.value;renderPipeline()">
        <option value="">All statuses</option>
        <option value="open"${filterStatus==='open'?' selected':''}>Open</option>
        <option value="partial"${filterStatus==='partial'?' selected':''}>Partial</option>
        <option value="complete"${filterStatus==='complete'?' selected':''}>Complete</option>
        <option value="invoiced"${filterStatus==='invoiced'?' selected':''}>Invoiced</option>
        <option value="overdue"${filterStatus==='overdue'?' selected':''}>Overdue</option>
      </select>
      <select onchange="filterInherited=this.value;renderPipeline()">
        <option value="">All orders</option>
        <option value="inherited"${filterInherited==='inherited'?' selected':''}>Inherited backlog</option>
        <option value="new"${filterInherited==='new'?' selected':''}>New orders</option>
      </select>
      <select onchange="filterCustomer=this.value;renderPipeline()">
        <option value="">All customers</option>${custOpts}
      </select>
      <button class="btn btn-primary" onclick="showAddPO()">+ New PO</button>
      <button class="btn" onclick="exportCSV()">Export CSV</button>
    </div>
    <div id="po-list">${cards}</div>`;
}

function poTotalHours(po){return po.lines.reduce((s,l)=>s+l.qty*skuLaborHours(l.desc),0);}
function poOpenHours(po){return po.lines.reduce((s,l)=>s+lineOpenQty(l)*skuLaborHours(l.desc),0);}

function poCard(po){
  const st=poStatus(po),p=poPct(po),isOpen=expanded[po.id],od=isOverdue(po);
  const warn=!po.cin7||!po.fb;
  const iTag=po.inherited
    ?`<span class="badge" style="background:rgba(79,124,255,.15);color:#7da4ff;margin-left:6px;font-size:9px;">inherited</span>`
    :`<span class="badge" style="background:rgba(34,201,122,.12);color:#22c97a;margin-left:6px;font-size:9px;">new</span>`;
  const commitInfo=po.commitDate?`&nbsp;·&nbsp; committed: ${po.commitDate}`
    :`&nbsp;·&nbsp; <span style="color:var(--red);font-size:10px;">no commit date</span>`;
  const totalHrs=poTotalHours(po);
  const openHrs=poOpenHours(po);
  const hrsDisplay=totalHrs>0?totalHrs.toFixed(1):'—';
  const openHrsDisplay=openHrs>0?openHrs.toFixed(1):'—';
  const detail=isOpen?`
    <div class="po-detail">
      <div class="detail-grid">
        <div class="field-group"><span class="field-label">Cin7 SO#</span><input class="field-input" type="text" value="${po.so}" placeholder="Enter SO#" onchange="saveField('${po.id}','so',this.value)"/></div>
        <div class="field-group"><span class="field-label">Fishbowl WO#</span><input class="field-input" type="text" value="${po.wo}" placeholder="Enter WO#" onchange="saveField('${po.id}','wo',this.value)"/></div>
        <div class="field-group"><span class="field-label">Original due date</span><input class="field-input" type="date" value="${po.due}" onchange="saveField('${po.id}','due',this.value)"/></div>
        <div class="field-group"><span class="field-label">Committed ship date</span><input class="field-input" type="date" value="${po.commitDate||''}" onchange="saveField('${po.id}','commitDate',this.value)" style="${!po.commitDate?'border-color:var(--red);':''}"/></div>
        <div class="field-group"><span class="field-label">Date received</span><input class="field-input" type="date" value="${po.rcvd}" onchange="saveField('${po.id}','rcvd',this.value)"/></div>
        <div class="field-group"><span class="field-label">Notes</span><input class="field-input" type="text" value="${po.notes||''}" placeholder="Internal notes" onchange="saveField('${po.id}','notes',this.value)"/></div>
      </div>
      <div style="margin-top:10px;display:flex;align-items:center;gap:14px;flex-wrap:wrap;">
        <label class="chk-label"><input type="checkbox" ${po.cin7?'checked':''} onchange="saveField('${po.id}','cin7',this.checked)"/> In Cin7</label>
        <label class="chk-label"><input type="checkbox" ${po.fb?'checked':''} onchange="saveField('${po.id}','fb',this.checked)"/> In Fishbowl</label>
        <label class="chk-label"><input type="checkbox" ${po.inherited?'checked':''} onchange="saveField('${po.id}','inherited',this.checked)"/> Inherited backlog</label>
        <div style="flex:1;"></div>
        <button class="btn btn-xs btn-primary" onclick="showFulfillPO('${po.id}')">Fulfill / ship</button>
        <button class="btn btn-xs" onclick="showAddLine('${po.id}')">+ Add line</button>
        <button class="btn btn-xs btn-danger" onclick="removePO('${po.id}')">Delete PO</button>
        <span class="saved-msg" id="flash-${po.id}">✓ saved</span>
      </div>
    </div>${linesSection(po)}`:'';
  return`<div class="po-card${od?' overdue':''}">
    <div class="po-header" onclick="togglePO('${po.id}')">
      <span class="chevron${isOpen?' open':''}">&#9658;</span>
      <div><div class="po-customer">${po.customer}${iTag}</div>
        <div class="po-meta">PO: ${po.cpo} &nbsp;·&nbsp; SO: ${po.so||'—'} &nbsp;·&nbsp; WO: ${po.wo||'—'}${warn?' &nbsp;·&nbsp; ⚠ needs entry':''}</div></div>
      <div><div class="po-lines-info">${po.lines.length} line${po.lines.length!==1?'s':''} &nbsp;·&nbsp; due: ${po.due||'—'}${commitInfo}</div>
        <div class="prog-wrap">${progBar(p)}<span class="prog-pct">${p}%</span></div></div>
      <div class="col-val"><div class="col-label">value</div><div class="col-num">${fmt(poValue(po))}</div></div>
      <div class="col-val"><div class="col-label">shipped</div><div class="col-num amber">${fmt(poShipped(po))}</div></div>
      <div class="col-val"><div class="col-label">invoiced</div><div class="col-num green">${fmt(poInvoiced(po))}</div></div>
      <div class="col-val"><div class="col-label">open $</div><div class="col-num">${fmt(poOpen(po))}</div></div>
      <div class="col-val"><div class="col-label">total hrs</div><div class="col-num" style="font-size:12px;">${hrsDisplay}</div></div>
      <div class="col-val"><div class="col-label">open hrs</div><div class="col-num amber" style="font-size:12px;">${openHrsDisplay}</div></div>
      <span class="badge ${st}">${st}</span><div></div>
    </div>${detail}</div>`;
}

function linesSection(po){
  const rows=po.lines.map(l=>{
    const shQ=lineShippedQty(l),openQ=lineOpenQty(l),shV=lineShippedVal(l),lv=lineValue(l);
    const lp=lv>0?Math.round(shQ/l.qty*100):0;
    const lst=lineStatus(l);
    const ships=l.shipped.length>0?`
      <div class="shipments" onclick="event.stopPropagation()">
        <div class="ship-header"><span>Date</span><span>Qty</span><span>Value</span><span>Invoice#</span><span></span></div>
        ${l.shipped.map((sh,si)=>`<div class="ship-row">
          <span>${sh.date||'—'}</span><span>${sh.qty} ${l.unit}</span><span>${fmt(sh.qty*l.unitPrice)}</span>
          <input class="ship-inv" type="text" value="${sh.inv}" placeholder="invoice#" onchange="setShipInv('${po.id}','${l.id}',${si},this.value)"/>
          <button class="btn-ghost" onclick="removeShipment('${po.id}','${l.id}',${si})">remove</button>
        </div>`).join('')}
      </div>`:'';
    return`<div class="line-row" style="flex-wrap:wrap;">
      <div class="line-desc" title="${l.desc}">${l.desc}</div>
      <div class="line-num">${l.qty}</div><div class="line-num">${fmt(l.unitPrice)}</div><div class="line-num">${fmt(lv)}</div>
      <div class="line-num" style="display:flex;align-items:center;gap:4px;justify-content:flex-end;">${progBar(lp)}<span style="font-size:10px;">${shQ}/${l.qty}</span></div>
      <div class="line-num amber">${fmt(shV)}</div><div class="line-num">${fmt(openQ*l.unitPrice)}</div>
      <span class="badge ${lst}" style="justify-self:end;">${lst}</span>
      <div class="line-actions">
        <button class="btn btn-xs btn-danger" onclick="removeLine('${po.id}','${l.id}')">✕</button>
      </div>
      ${l.shipped.length>0?`<div style="grid-column:1/-1;">${ships}</div>`:''}
    </div>`;
  }).join('');
  return`<div class="lines-section" onclick="event.stopPropagation()">
    <div class="lines-header"><span>Description</span><span>Qty</span><span>Unit $</span><span>Value</span><span>Fulfilled</span><span>Shipped $</span><span>Open $</span><span>Status</span><span></span></div>
    ${rows||'<div style="padding:8px 0;font-size:12px;color:var(--text3);">No lines yet — click + Add line</div>'}
  </div>`;
}

// ── Projections ────────────────────────────────────────────────
function renderProjections(){
  const mKey=ds=>{if(!ds)return null;const d=new Date(ds);if(isNaN(d))return null;return{key:d.toLocaleString('default',{month:'short',year:'numeric'}),d};};
  const dueB={},shipB={};
  pos.forEach(po=>{
    const due=mKey(po.due);
    if(due){
      if(!dueB[due.key])dueB[due.key]={rev:0,open:0,d:due.d};
      dueB[due.key].rev+=poValue(po);dueB[due.key].open+=poOpen(po);
    }
    po.lines.forEach(l=>l.shipped.forEach(sh=>{
      const sm=mKey(sh.date);if(!sm)return;
      if(!shipB[sm.key])shipB[sm.key]={shipped:0,invoiced:0,d:sm.d};
      const v=sh.qty*l.unitPrice;
      shipB[sm.key].shipped+=v;if(sh.inv)shipB[sm.key].invoiced+=v;
    }));
  });
  const allKeys=new Set([...Object.keys(dueB),...Object.keys(shipB)]);
  const months=[...allKeys].map(key=>{
    const due=dueB[key]||{rev:0,open:0,d:new Date(key)};
    const ship=shipB[key]||{shipped:0,invoiced:0};
    return{key,d:due.d||ship.d,rev:due.rev,open:due.open,shipped:ship.shipped,invoiced:ship.invoiced};
  }).sort((a,b)=>a.d-b.d);
  const tRev=pos.reduce((s,p)=>s+poValue(p),0);
  const tOpen=pos.reduce((s,p)=>s+poOpen(p),0);
  const tShip=pos.reduce((s,p)=>s+poShipped(p),0);
  // Use invoices table as source of truth for invoiced amount
  const tInv=invoices.reduce((s,i)=>s+i.amount,0);
  const mRows=months.map((m,i)=>`
    <div class="proj-table-row proj-5col" style="${i%2?'':'background:rgba(255,255,255,.02)'}">
      <span>${m.key}</span><span class="proj-val">${m.rev>0?fmt(m.rev):'—'}</span>
      <span class="proj-val amber">${m.shipped>0?fmt(m.shipped):'—'}</span>
      <span class="proj-val green">${m.invoiced>0?fmt(m.invoiced):'—'}</span>
      <span class="proj-val">${m.open>0?fmt(m.open):'—'}</span>
    </div>`).join('');
  const custMap={};
  pos.forEach(po=>{if(!custMap[po.customer])custMap[po.customer]={rev:0,invoiced:0,open:0};custMap[po.customer].rev+=poValue(po);custMap[po.customer].open+=poOpen(po);});
  // Add invoiced amounts from invoices table
  invoices.forEach(inv=>{if(custMap[inv.customer])custMap[inv.customer].invoiced+=inv.amount;});
  const cRows=Object.entries(custMap).sort((a,b)=>b[1].rev-a[1].rev).map(([c,d],i)=>`
    <div class="proj-table-row" style="grid-template-columns:2fr 1fr 1fr 1fr;${i%2?'':'background:rgba(255,255,255,.02)'}">
      <span>${c}</span><span class="proj-val">${fmt(d.rev)}</span><span class="proj-val green">${fmt(d.invoiced)}</span><span class="proj-val amber">${fmt(d.open)}</span>
    </div>`).join('');
  document.getElementById('content').innerHTML=`
    <div class="proj-grid">
      <div class="metric"><div class="metric-label">Total pipeline</div><div class="metric-value">${fmt(tRev)}</div><div class="metric-sub">${pos.length} POs</div></div>
      <div class="metric"><div class="metric-label">Invoiced to date</div><div class="metric-value green">${fmt(tInv)}</div><div class="metric-sub">${tRev>0?Math.round(tInv/tRev*100):0}% of pipeline</div></div>
      <div class="metric"><div class="metric-label">Still open</div><div class="metric-value amber">${fmt(tOpen)}</div></div>
    </div>
    <div class="proj-table">
      <div style="padding:8px 14px 4px;font-size:10px;color:var(--text3);font-family:var(--mono);">PO value &amp; open = grouped by due date &nbsp;·&nbsp; Shipped &amp; invoiced = grouped by actual ship date</div>
      <div class="proj-table-header proj-5col"><span>Month</span><span class="proj-val">PO value due</span><span class="proj-val">Shipped</span><span class="proj-val">Invoiced</span><span class="proj-val">Open balance</span></div>
      ${mRows}
      <div class="proj-table-row proj-5col total-row"><span>TOTAL</span><span class="proj-val">${fmt(tRev)}</span><span class="proj-val amber">${fmt(tShip)}</span><span class="proj-val green">${fmt(tInv)}</span><span class="proj-val">${fmt(tOpen)}</span></div>
    </div>
    <div class="proj-table">
      <div class="proj-table-header" style="grid-template-columns:2fr 1fr 1fr 1fr;"><span>Customer</span><span class="proj-val">Total value</span><span class="proj-val">Invoiced</span><span class="proj-val">Open</span></div>
      ${cRows}
    </div>`;
}

// ── Labor dashboard ────────────────────────────────────────────
function skuLaborHours(desc){
  const s=skus.find(x=>x.desc===desc);
  return s?s.laborHours:0;
}

function renderLabor(){
  // ── Projected hours: open line items × BOM hours, bucketed by PO due month
  const projMap={};
  pos.forEach(po=>{
    if(!po.due)return;
    const d=new Date(po.due);
    const mk=d.toISOString().slice(0,7); // YYYY-MM
    const label=d.toLocaleString('default',{month:'short',year:'numeric'});
    if(!projMap[mk])projMap[mk]={mk,label,projHrs:0,d};
    po.lines.forEach(l=>{
      const openQty=lineOpenQty(l);
      projMap[mk].projHrs+=openQty*skuLaborHours(l.desc);
    });
  });

  // ── Billable hours: shipped qty × BOM hours, bucketed by actual ship date
  const billMap={};
  pos.forEach(po=>{
    po.lines.forEach(l=>{
      l.shipped.forEach(sh=>{
        if(!sh.date)return;
        const d=new Date(sh.date);
        const mk=d.toISOString().slice(0,7);
        const label=d.toLocaleString('default',{month:'short',year:'numeric'});
        if(!billMap[mk])billMap[mk]={mk,label,billHrs:0,d};
        billMap[mk].billHrs+=sh.qty*skuLaborHours(l.desc);
      });
    });
  });

  // ── Actual hours: sum labor_logs by month
  const actualMap={};
  laborLogs.forEach(log=>{
    if(!actualMap[log.month])actualMap[log.month]={totalHrs:0};
    actualMap[log.month].totalHrs+=log.hours;
  });

  // ── Merge all months for efficiency table
  const allMonths=new Set([...Object.keys(projMap),...Object.keys(billMap),...Object.keys(actualMap)]);
  const effRows=[...allMonths].sort().map(mk=>{
    const proj=projMap[mk]||{projHrs:0,label:mk};
    const bill=billMap[mk]||{billHrs:0,label:mk};
    const label=proj.label||bill.label||mk;
    const billHrs=bill.billHrs;
    const actualHrs=actualMap[mk]?.totalHrs||0;
    const eff=actualHrs>0?Math.round(billHrs/actualHrs*100):null;
    return{mk,label,projHrs:proj.projHrs,billHrs,actualHrs,eff};
  });

  // ── Summary metrics
  const totalProjHrs=Object.values(projMap).reduce((s,m)=>s+m.projHrs,0);
  const totalBillHrs=Object.values(billMap).reduce((s,m)=>s+m.billHrs,0);
  const totalActualHrs=laborLogs.reduce((s,l)=>s+l.hours,0);
  const overallEff=totalActualHrs>0?Math.round(totalBillHrs/totalActualHrs*100):null;
  const capacity=settings.laborCapacity||0;

  // ── Projected months sorted
  const projMonths=Object.values(projMap).sort((a,b)=>a.d-b.d);

  // ── Employee log section for current/recent months
  const now=new Date();
  const currentMonth=now.toISOString().slice(0,7);
  const prevMonth=new Date(now.getFullYear(),now.getMonth()-1,1).toISOString().slice(0,7);
  const logMonths=[prevMonth,currentMonth];

  const effColor=e=>e===null?'var(--text3)':e>=85?'var(--green)':e>=65?'var(--amber)':'var(--red)';
  const effClass=e=>e===null?'':e>=85?'green':e>=65?'amber':'red';

  const effRowsHtml=effRows.map((r,i)=>{
    const barPct=r.eff!==null?Math.min(r.eff,150):0;
    const barColor=effColor(r.eff);
    const rowClass=r.eff!==null&&r.eff<65?' over':r.eff!==null&&r.eff<85?' warn':'';
    return`<div class="lt-row${rowClass}" style="grid-template-columns:1fr 80px 80px 80px 80px 100px;">
      <span>${r.label}</span>
      <span class="lt-val">${r.projHrs>0?r.projHrs.toFixed(1)+'h':'—'}</span>
      <span class="lt-val${r.billHrs>0?' amber':''}">${r.billHrs>0?r.billHrs.toFixed(1)+'h':'—'}</span>
      <span class="lt-val">${r.actualHrs>0?r.actualHrs.toFixed(1)+'h':'—'}</span>
      <span class="lt-val ${effClass(r.eff)}">${r.eff!==null?r.eff+'%':'—'}</span>
      <span style="display:flex;align-items:center;gap:6px;">
        <span class="eff-bar" style="flex:1;"><span class="eff-fill" style="width:${Math.min(barPct,100)}%;background:${barColor};display:block;height:100%;"></span></span>
      </span>
    </div>`;
  }).join('')||'<div style="padding:12px 14px;font-size:12px;color:var(--text3);">No labor data yet — add BOM hours to SKUs and log actual hours below</div>';

  const projRowsHtml=projMonths.map((r,i)=>{
    const pct=capacity>0?Math.round(r.projHrs/capacity*100):null;
    const cls=pct!==null&&pct>100?' over':pct!==null&&pct>85?' warn':'';
    return`<div class="lt-row${cls}" style="grid-template-columns:1.2fr 80px 80px 100px;">
      <span>${r.label}</span>
      <span class="lt-val">${r.projHrs.toFixed(1)}h</span>
      <span class="lt-val">${capacity>0?capacity+'h':'—'}</span>
      <span class="lt-val ${pct!==null&&pct>100?'red':pct!==null&&pct>85?'amber':'green'}">${pct!==null?pct+'%':'—'}</span>
    </div>`;
  }).join('')||'<div style="padding:12px 14px;font-size:12px;color:var(--text3);">No open orders with BOM hours set</div>';

  // ── Employee log HTML
  const empLogHtml=employees.filter(e=>e.active).map(emp=>{
    return logMonths.map(mk=>{
      const log=laborLogs.find(l=>l.employeeId===emp.id&&l.month===mk);
      const d=new Date(mk+'-15');
      const label=d.toLocaleString('default',{month:'short',year:'numeric'});
      return`<div class="log-row">
        <span style="font-size:12px;">${emp.name}</span>
        <span style="font-size:11px;color:var(--text3);">${emp.role}</span>
        <span style="font-size:12px;color:var(--text3);">${label}</span>
        <input class="month-picker" type="number" min="0" step="0.5" placeholder="hrs"
          value="${log?log.hours:''}"
          onchange="saveLogEntry('${emp.id}','${mk}',this.value,'${log?log.id:''}')"
          style="width:80px;"/>
        <span style="font-size:11px;color:var(--text3);">${log&&log.notes?log.notes:''}</span>
      </div>`;
    }).join('');
  }).join('')||'<div style="font-size:12px;color:var(--text3);padding:8px 0;">No active employees — add them below</div>';

  document.getElementById('content').innerHTML=`
    <div class="labor-grid">
      <div class="metric"><div class="metric-label">Total projected hrs (open)</div><div class="metric-value">${totalProjHrs.toFixed(1)}<span style="font-size:14px;"> h</span></div><div class="metric-sub">From open orders × BOM</div></div>
      <div class="metric"><div class="metric-label">Billable hrs (shipped)</div><div class="metric-value amber">${totalBillHrs.toFixed(1)}<span style="font-size:14px;"> h</span></div><div class="metric-sub">Shipped qty × BOM hours</div></div>
      <div class="metric"><div class="metric-label">Actual hrs logged</div><div class="metric-value">${totalActualHrs.toFixed(1)}<span style="font-size:14px;"> h</span></div><div class="metric-sub">From employee logs</div></div>
      <div class="metric"><div class="metric-label">Overall efficiency</div><div class="metric-value ${effClass(overallEff)}">${overallEff!==null?overallEff+'%':'—'}</div><div class="metric-sub">Billable ÷ actual</div></div>
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:20px;">
      <div class="labor-table">
        <div class="labor-table-title">Projected hours by month</div>
        <div class="labor-table-sub">Open orders × BOM hours &nbsp;·&nbsp; capacity: ${capacity>0?capacity+'h/mo':'not set in Settings'}</div>
        <div class="lt-header" style="grid-template-columns:1.2fr 80px 80px 100px;"><span>Month</span><span class="lt-val">Proj hrs</span><span class="lt-val">Capacity</span><span class="lt-val">% of cap</span></div>
        ${projRowsHtml}
      </div>
      <div class="labor-table">
        <div class="labor-table-title">Efficiency by month</div>
        <div class="labor-table-sub">Billable (shipped×BOM) vs actual logged &nbsp;·&nbsp; <span style="color:var(--green);">≥85% good</span> &nbsp;<span style="color:var(--amber);">65–84% watch</span> &nbsp;<span style="color:var(--red);">&lt;65% review</span></div>
        <div class="lt-header" style="grid-template-columns:1fr 80px 80px 80px 80px 100px;"><span>Month</span><span class="lt-val">Proj</span><span class="lt-val">Billable</span><span class="lt-val">Actual</span><span class="lt-val">Eff %</span><span></span></div>
        ${effRowsHtml}
      </div>
    </div>

    <div class="labor-table">
      <div class="labor-table-title">Log actual hours</div>
      <div class="labor-table-sub">Enter hours worked per employee for previous and current month</div>
      <div class="log-row" style="border-bottom:0.5px solid var(--border2);">
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;">Employee</span>
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;">Role</span>
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;">Month</span>
        <span style="font-size:10px;color:var(--text3);text-transform:uppercase;">Hours</span>
        <span></span>
      </div>
      <div style="padding:0 14px;">
        ${empLogHtml}
      </div>
      <div style="padding:12px 14px;border-top:1px solid var(--border);">
        <div style="font-size:11px;font-weight:600;color:var(--text3);margin-bottom:8px;text-transform:uppercase;letter-spacing:.06em;">Add employee</div>
        <div style="display:grid;grid-template-columns:1fr 1fr auto;gap:8px;align-items:end;">
          <div><div class="field-label" style="margin-bottom:4px;">Name</div><input id="new-emp-name" class="field-input" type="text" placeholder="Employee name"/></div>
          <div><div class="field-label" style="margin-bottom:4px;">Role</div><input id="new-emp-role" class="field-input" type="text" placeholder="e.g. Production tech"/></div>
          <button class="btn btn-primary" onclick="addEmployee()">+ Add</button>
        </div>
      </div>
    </div>

    ${employees.length>0?`<div class="labor-table">
      <div class="labor-table-title">Team</div>
      <div class="labor-table-sub">Toggle active/inactive — inactive employees are hidden from logging</div>
      ${employees.map(e=>`<div class="lt-row" style="grid-template-columns:1fr 1fr auto auto;">
        <span>${e.name}</span>
        <span style="color:var(--text3);">${e.role}</span>
        <span class="badge ${e.active?'complete':'invoiced'}">${e.active?'active':'inactive'}</span>
        <div style="display:flex;gap:6px;">
          <button class="btn btn-xs" onclick="toggleEmployee('${e.id}',${!e.active})">${e.active?'Deactivate':'Activate'}</button>
          <button class="btn btn-xs btn-danger" onclick="removeEmployee('${e.id}')">Remove</button>
        </div>
      </div>`).join('')}
    </div>`:''}`;
}

async function saveLogEntry(empId,month,hoursVal,existingId){
  const hours=parseFloat(hoursVal)||0;
  const log={id:existingId||undefined,employeeId:empId,month,hours,notes:''};
  try{
    const saved=await dbSaveLog(log);
    const existing=laborLogs.findIndex(l=>l.employeeId===empId&&l.month===month);
    if(existing>=0) laborLogs[existing]={...log,id:saved.id};
    else laborLogs.push({...log,id:saved.id});
  }catch(e){console.error('Log save error',e);}
}

async function addEmployee(){
  const name=document.getElementById('new-emp-name')?.value.trim();
  const role=document.getElementById('new-emp-role')?.value.trim()||'';
  if(!name){alert('Enter a name.');return;}
  if(employees.find(e=>e.name===name)){alert('Employee already exists.');return;}
  try{
    const emp={name,role,active:true};
    const saved=await dbSaveEmployee(emp);
    employees.push({id:saved.id,name,role,active:true});
    employees.sort((a,b)=>a.name.localeCompare(b.name));
    renderLabor();
  }catch(e){alert('Error: '+e.message);}
}

async function toggleEmployee(id,active){
  const emp=employees.find(e=>e.id===id);if(!emp)return;
  emp.active=active;
  try{await dbSaveEmployee(emp);renderLabor();}
  catch(e){alert('Error: '+e.message);}
}

async function removeEmployee(id){
  if(!confirm('Remove this employee? Their logged hours will also be deleted.'))return;
  try{
    await dbDeleteEmployee(id);
    employees=employees.filter(e=>e.id!==id);
    laborLogs=laborLogs.filter(l=>l.employeeId!==id);
    renderLabor();
  }catch(e){alert('Error: '+e.message);}
}

// ── Invoices ───────────────────────────────────────────────────
let invFilterStatus='all';   // all | unpaid | paid | overdue
let invFilterCustomer='';
let invViewMode='month';     // month | week | list
let invSearchQ='';

function invIsOverdue(inv){
  if(inv.paid||!inv.dueDate) return false;
  return new Date(inv.dueDate)<new Date();
}
function invDaysOverdue(inv){
  if(!inv.dueDate||inv.paid) return 0;
  return Math.max(0,Math.round((new Date()-new Date(inv.dueDate))/(1000*60*60*24)));
}
function invWeekLabel(dateStr){
  const d=new Date(dateStr);
  const start=new Date(d);start.setDate(d.getDate()-d.getDay());
  const end=new Date(start);end.setDate(start.getDate()+6);
  return`Week of ${start.toLocaleDateString('en-US',{month:'short',day:'numeric'})} – ${end.toLocaleDateString('en-US',{month:'short',day:'numeric'})}`;
}
function invMonthKey(dateStr){
  if(!dateStr) return'';
  const d=new Date(dateStr);
  return d.toLocaleString('default',{month:'long',year:'numeric'});
}
function invWeekKey(dateStr){
  if(!dateStr) return'';
  const d=new Date(dateStr);
  d.setDate(d.getDate()-d.getDay());
  return d.toISOString().slice(0,10);
}

function renderInvoices(){
  const today=new Date(); today.setHours(0,0,0,0);
  const totalBilled=invoices.reduce((s,i)=>s+i.amount,0);
  const totalPaid=invoices.filter(i=>i.paid).reduce((s,i)=>s+(i.paidAmount??i.amount),0);
  const totalOutstanding=invoices.filter(i=>!i.paid).reduce((s,i)=>s+i.amount,0);
  const overdueInvs=invoices.filter(i=>invIsOverdue(i));
  const totalOverdue=overdueInvs.reduce((s,i)=>s+i.amount,0);
  const unpaidCount=invoices.filter(i=>!i.paid).length;

  // Filter
  const custs=[...new Set(invoices.map(i=>i.customer))].sort();
  const custOpts=custs.map(c=>`<option value="${c}"${invFilterCustomer===c?' selected':''}>${c}</option>`).join('');
  let filtered=invoices.filter(i=>{
    if(invFilterStatus==='unpaid'&&i.paid) return false;
    if(invFilterStatus==='paid'&&!i.paid) return false;
    if(invFilterStatus==='overdue'&&!invIsOverdue(i)) return false;
    if(invFilterCustomer&&i.customer!==invFilterCustomer) return false;
    if(invSearchQ){
      const q=invSearchQ.toLowerCase();
      if(!(i.invoiceNumber+i.customer+i.soNumber+(i.poId||'')).toLowerCase().includes(q)) return false;
    }
    return true;
  });
  filtered=[...filtered].sort((a,b)=>new Date(b.issueDate)-new Date(a.issueDate));

  const overdueBanner=totalOverdue>0?`
    <div class="ar-banner">
      <div>
        <div class="ar-banner-text" style="font-weight:600;margin-bottom:2px;">⚠ Overdue invoices</div>
        <div class="ar-banner-text" style="font-size:12px;">${overdueInvs.length} invoice${overdueInvs.length!==1?'s':''} past due date — action required</div>
      </div>
      <div class="ar-banner-amount">${fmt(totalOverdue)}</div>
    </div>`:'';

  // Build invoice rows HTML
  function invRowHtml(inv){
    const od=invIsOverdue(inv);
    const po=pos.find(p=>p.id===inv.poId);
    const cpoDisplay=po?po.cpo:inv.poId||'—';
    const daysOd=invDaysOverdue(inv);
    const dueDateDisplay=inv.dueDate
      ?`<span class="${od?'inv-overdue':''}">${inv.dueDate}${od?` (+${daysOd}d)`:''}</span>`
      :'—';
    const paidDisplay=inv.paid
      ?`<span style="color:var(--green);font-family:var(--mono);font-size:11px;">${inv.paidDate||'✓'}</span>`
      :`<span style="color:var(--text3);font-size:11px;">${od?'<span style="color:var(--red);">OVERDUE</span>':'pending'}</span>`;
    return`<div class="inv-row${inv.paid?' paid-row':''}">
      <span class="inv-num">${inv.invoiceNumber}</span>
      <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${inv.customer}">${inv.customer}</span>
      <span class="inv-date" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="${cpoDisplay}">${cpoDisplay}</span>
      <span class="inv-date">${inv.soNumber||'—'}</span>
      <span class="inv-date">${inv.issueDate||'—'}</span>
      <span class="inv-date">${dueDateDisplay}</span>
      <span class="inv-amt${od&&!inv.paid?' inv-overdue':''}">${fmt(inv.amount)}</span>
      <span>${paidDisplay}</span>
      <div style="display:flex;align-items:center;gap:6px;">
        <input type="checkbox" class="pay-chk" ${inv.paid?'checked':''} title="${inv.paid?'Mark unpaid':'Mark paid'}"
          onchange="togglePaid('${inv.id}',this.checked)"/>
        <button class="btn-ghost" style="font-size:10px;" onclick="showInvoiceDetail('${inv.id}')">⋯</button>
        <button class="btn-ghost" style="font-size:10px;color:var(--red);" onclick="deleteInvoice('${inv.id}')">✕</button>
      </div>
    </div>`;
  }

  let tableHtml='';
  if(invViewMode==='list'){
    tableHtml=`<div class="inv-table">
      <div class="inv-header"><span>Invoice#</span><span>Customer</span><span>Cust PO#</span><span>SO#</span><span>Issued</span><span>Due</span><span style="text-align:right">Amount</span><span>Payment</span><span></span></div>
      ${filtered.map(invRowHtml).join('')||'<div style="padding:16px 14px;font-size:12px;color:var(--text3);">No invoices match your filters</div>'}
    </div>`;
  } else if(invViewMode==='month'){
    const byMonth={};
    filtered.forEach(inv=>{
      const k=invMonthKey(inv.issueDate);
      if(!byMonth[k])byMonth[k]=[];
      byMonth[k].push(inv);
    });
    tableHtml=Object.entries(byMonth).map(([month,invs])=>{
      const total=invs.reduce((s,i)=>s+i.amount,0);
      const paid=invs.filter(i=>i.paid).reduce((s,i)=>s+(i.paidAmount??i.amount),0);
      const outstanding=total-paid;
      return`<div class="inv-table">
        <div class="month-group">
          <span>${month}</span>
          <span class="month-summary">${invs.length} invoice${invs.length!==1?'s':''} &nbsp;·&nbsp; billed: ${fmt(total)} &nbsp;·&nbsp; paid: <span style="color:var(--green);">${fmt(paid)}</span> &nbsp;·&nbsp; outstanding: <span style="color:${outstanding>0?'var(--amber)':'var(--green)'};">${fmt(outstanding)}</span></span>
        </div>
        <div class="inv-header"><span>Invoice#</span><span>Customer</span><span>Cust PO#</span><span>SO#</span><span>Issued</span><span>Due</span><span style="text-align:right">Amount</span><span>Payment</span><span></span></div>
        ${invs.map(invRowHtml).join('')}
      </div>`;
    }).join('')||'<div style="padding:16px;font-size:12px;color:var(--text3);">No invoices match your filters</div>';
  } else { // week
    const byWeek={};
    filtered.forEach(inv=>{
      const k=invWeekKey(inv.issueDate);
      if(!byWeek[k])byWeek[k]=[];
      byWeek[k].push(inv);
    });
    tableHtml=Object.entries(byWeek).sort((a,b)=>b[0].localeCompare(a[0])).map(([wk,invs])=>{
      const total=invs.reduce((s,i)=>s+i.amount,0);
      const paid=invs.filter(i=>i.paid).reduce((s,i)=>s+(i.paidAmount??i.amount),0);
      return`<div class="inv-table">
        <div class="month-group">
          <span>${invWeekLabel(wk+' 12:00')}</span>
          <span class="month-summary">${invs.length} invoice${invs.length!==1?'s':''} &nbsp;·&nbsp; ${fmt(total)} billed &nbsp;·&nbsp; <span style="color:var(--green);">${fmt(paid)}</span> paid</span>
        </div>
        <div class="inv-header"><span>Invoice#</span><span>Customer</span><span>Cust PO#</span><span>SO#</span><span>Issued</span><span>Due</span><span style="text-align:right">Amount</span><span>Payment</span><span></span></div>
        ${invs.map(invRowHtml).join('')}
      </div>`;
    }).join('')||'<div style="padding:16px;font-size:12px;color:var(--text3);">No invoices match your filters</div>';
  }

  // Monthly summary table
  const monthSummaryMap={};
  invoices.forEach(inv=>{
    const k=invMonthKey(inv.issueDate);
    if(!k) return;
    if(!monthSummaryMap[k])monthSummaryMap[k]={count:0,billed:0,paid:0,overdue:0};
    monthSummaryMap[k].count++;
    monthSummaryMap[k].billed+=inv.amount;
    if(inv.paid)monthSummaryMap[k].paid+=(inv.paidAmount??inv.amount);
    if(invIsOverdue(inv))monthSummaryMap[k].overdue+=inv.amount;
  });
  const monthSummaryRows=Object.entries(monthSummaryMap).map(([m,d],i)=>`
    <div class="imt-row" style="${i%2?'':'background:rgba(255,255,255,.02)'}">
      <span>${m}</span>
      <span class="imt-val">${d.count}</span>
      <span class="imt-val">${fmt(d.billed)}</span>
      <span class="imt-val green">${fmt(d.paid)}</span>
      <span class="imt-val">${fmt(d.billed-d.paid)}</span>
      <span class="imt-val${d.overdue>0?' red':''}">${d.overdue>0?fmt(d.overdue):'—'}</span>
    </div>`).join('');

  document.getElementById('content').innerHTML=`
    <div class="inv-metrics">
      <div class="metric"><div class="metric-label">Total billed</div><div class="metric-value">${fmt(totalBilled)}</div><div class="metric-sub">${invoices.length} invoices</div></div>
      <div class="metric"><div class="metric-label">Collected</div><div class="metric-value green">${fmt(totalPaid)}</div></div>
      <div class="metric"><div class="metric-label">Outstanding</div><div class="metric-value amber">${fmt(totalOutstanding)}</div><div class="metric-sub">${unpaidCount} unpaid</div></div>
      <div class="metric"><div class="metric-label">Overdue</div><div class="metric-value${totalOverdue>0?' red':''}">${fmt(totalOverdue)}</div><div class="metric-sub">${overdueInvs.length} past due</div></div>
      <div class="metric"><div class="metric-label">Collection rate</div><div class="metric-value${totalBilled>0&&totalPaid/totalBilled>0.9?' green':' amber'}">${totalBilled>0?Math.round(totalPaid/totalBilled*100):0}%</div></div>
    </div>

    ${overdueBanner}

    <div class="inv-toolbar">
      <div class="search-wrap"><span class="search-icon">&#9906;</span><input type="text" placeholder="Search invoice#, customer, SO#..." value="${invSearchQ}" oninput="invSearchQ=this.value;renderInvoices()"/></div>
      <select onchange="invFilterStatus=this.value;renderInvoices()">
        <option value="all"${invFilterStatus==='all'?' selected':''}>All invoices</option>
        <option value="unpaid"${invFilterStatus==='unpaid'?' selected':''}>Unpaid only</option>
        <option value="paid"${invFilterStatus==='paid'?' selected':''}>Paid only</option>
        <option value="overdue"${invFilterStatus==='overdue'?' selected':''}>Overdue only</option>
      </select>
      <select onchange="invFilterCustomer=this.value;renderInvoices()">
        <option value="">All customers</option>${custOpts}
      </select>
      <div style="display:flex;gap:4px;background:var(--surface2);border:1px solid var(--border);border-radius:6px;padding:3px;">
        <button class="btn btn-xs${invViewMode==='month'?' btn-primary':''}" style="border:none;" onclick="invViewMode='month';renderInvoices()">By month</button>
        <button class="btn btn-xs${invViewMode==='week'?' btn-primary':''}" style="border:none;" onclick="invViewMode='week';renderInvoices()">By week</button>
        <button class="btn btn-xs${invViewMode==='list'?' btn-primary':''}" style="border:none;" onclick="invViewMode='list';renderInvoices()">List</button>
      </div>
      <button class="btn btn-primary" onclick="showAddInvoice()">+ Add invoice</button>
      <button class="btn" onclick="exportInvoiceCSV()">Export CSV</button>
    </div>

    ${tableHtml}

    <div class="inv-monthly-table">
      <div style="padding:10px 14px 6px;font-size:12px;font-weight:600;color:var(--text2);border-bottom:1px solid var(--border);">Monthly AR summary</div>
      <div class="imt-header"><span>Month</span><span class="imt-val">Count</span><span class="imt-val">Billed</span><span class="imt-val">Collected</span><span class="imt-val">Outstanding</span><span class="imt-val">Overdue</span></div>
      ${monthSummaryRows||'<div style="padding:12px 14px;font-size:12px;color:var(--text3);">No invoices yet</div>'}
      ${invoices.length>0?`<div class="imt-row total-row" style="grid-template-columns:1.2fr 80px 100px 100px 100px 100px;">
        <span>TOTAL</span><span class="imt-val">${invoices.length}</span>
        <span class="imt-val">${fmt(totalBilled)}</span>
        <span class="imt-val green">${fmt(totalPaid)}</span>
        <span class="imt-val">${fmt(totalOutstanding)}</span>
        <span class="imt-val${totalOverdue>0?' red':''}">${totalOverdue>0?fmt(totalOverdue):'—'}</span>
      </div>`:''}
    </div>`;
}

  if(paid&&!inv.paidDate) inv.paidDate=new Date().toISOString().slice(0,10);

  try{

    renderInvoices();
  }catch(e){alert('Error saving: '+e.message);}
}

function exportInvoiceCSV(){
  const rows=[['invoice_number','customer','cpo','so_number','issue_date','due_date','amount','paid','paid_date','paid_amount','paid_notes','notes']];
  const src=invFilterStatus!=='all'||invFilterCustomer||invSearchQ
    ? invoices.filter(i=>{
        if(invFilterStatus==='unpaid'&&i.paid) return false;
        if(invFilterStatus==='paid'&&!i.paid) return false;
        if(invFilterStatus==='overdue'&&!invIsOverdue(i)) return false;
        if(invFilterCustomer&&i.customer!==invFilterCustomer) return false;
        if(invSearchQ&&!(i.invoiceNumber+i.customer+i.soNumber).toLowerCase().includes(invSearchQ.toLowerCase())) return false;
        return true;
      })
    : invoices;
  const poMap=id=>pos.find(p=>p.id===id);
  src.forEach(i=>{
    const p=poMap(i.poId);
    rows.push([
      i.invoiceNumber,`"${i.customer}"`,
      p?p.cpo:i.poId||'',
      i.soNumber,i.issueDate||'',i.dueDate||'',
      i.amount,i.paid?'Y':'N',
      i.paidDate||'',
      i.paidAmount!=null?i.paidAmount:'',
      `"${i.paidNotes||''}"`,
      `"${i.notes||''}"`
    ]);
  });
  dl(rows.map(r=>r.join(',')).join('\n'),`invoices_${today()}.csv`,'text/csv');
}

async function importInvoiceCSV(e){
  const file=e.target.files[0];if(!file)return;
  const r=new FileReader();
  r.onload=async ev=>{
    try{
      const lines=ev.target.result.split('\n').filter(l=>l.trim());
      if(lines.length<2){alert('File is empty or has no data rows.');return;}
      const headers=lines[0].split(',').map(h=>h.trim().replace(/^"|"$/g,'').toLowerCase());
      const idx=h=>headers.indexOf(h);
      const parsed=[];
      for(let i=1;i<lines.length;i++){
        const cols=parseCSVLine(lines[i]);
        const invNum=cols[idx('invoice_number')]?.trim();
        if(!invNum)continue;
        const customer=cols[idx('customer')]?.trim()||'';
        const amount=parseFloat(cols[idx('amount')])||0;
        if(!customer||!amount)continue;
        parsed.push({
          invoiceNumber:invNum,customer,poId:'',
          soNumber:cols[idx('so_number')]?.trim()||'',
          issueDate:cols[idx('issue_date')]?.trim()||'',
          dueDate:cols[idx('due_date')]?.trim()||'',
          amount,notes:cols[idx('notes')]?.trim()||'',
          paid:cols[idx('paid')]?.trim().toUpperCase()==='Y',
          paidDate:cols[idx('paid_date')]?.trim()||'',
          paidAmount:cols[idx('paid_amount')]?.trim()?parseFloat(cols[idx('paid_amount')]):null,
          paidNotes:cols[idx('paid_notes')]?.trim()||'',
          _cpo:cols[idx('cpo')]?.trim()||'',
        });
      }
      if(!parsed.length){alert('No valid rows found. Check that invoice_number, customer, and amount columns are present.');return;}
      parsed.forEach(inv=>{
        if(inv._cpo){
          const match=pos.find(p=>p.cpo===inv._cpo||p.id===inv._cpo);
          if(match){inv.poId=match.id;if(!inv.soNumber)inv.soNumber=match.so||'';}
        }
        delete inv._cpo;
      });
      const existingNums=new Set(invoices.map(i=>i.invoiceNumber));
      const toAdd=parsed.filter(i=>!existingNums.has(i.invoiceNumber));
      const dupes=parsed.filter(i=>existingNums.has(i.invoiceNumber));
      const missingDates=toAdd.filter(i=>!i.issueDate);
      if(!toAdd.length){alert(`All ${parsed.length} invoice(s) already exist.`);e.target.value='';return;}
      let confirmMsg=`Ready to import ${toAdd.length} invoice(s)`;
      if(dupes.length) confirmMsg+=`, skipping ${dupes.length} duplicate(s)`;
      if(missingDates.length) confirmMsg+=`.\n\n⚠ ${missingDates.length} invoice(s) have no date — use the bulk date editor after import`;
      if(!confirm(confirmMsg+'\n\nProceed?')){e.target.value='';return;}
      setStatus('loading','Importing...');
      let done=0,errs=0;
      for(const inv of toAdd){
        try{const saved=await dbSaveInvoice(inv);invoices.unshift(mapInvoice(saved));done++;}
        catch(err){errs++;console.error('Invoice import error',inv.invoiceNumber,err);}
      }
      setStatus('ok','● Live');
      e.target.value='';
      currentTab='invoices';
      document.querySelectorAll('.sidebar-item').forEach(el=>el.classList.remove('active'));
      renderContent();
      const stillMissing=invoices.filter(i=>!i.issueDate);
      if(stillMissing.length>0){
        setTimeout(()=>{
          alert(`Imported ${done} invoice${done!==1?'s':''}${errs?` (${errs} failed)`:''}.\n\n${stillMissing.length} invoice${stillMissing.length!==1?'s':''} are missing dates — the bulk date editor will open now.`);
          showBulkDateEdit();
        },200);
      } else {
        alert('Imported '+done+' invoice'+(done!==1?'s':'')+(errs?' ('+errs+' failed)':'')+' successfully.');
      }
    }catch(err){setStatus('err','✕ Import error');alert('Error: '+err.message);console.error(err);e.target.value='';}
  };
  r.readAsText(file);
}

function setAllIssueDates(){
  const t=new Date().toISOString().slice(0,10);
  document.querySelectorAll('[id^="bde-issue-"]').forEach(el=>el.value=t);
}

async function saveBulkDates(){
  const missing=invoices.filter(i=>!i.issueDate);
  let saved=0,skipped=0,errs=0;
  for(const inv of missing){
    const issueEl=document.getElementById('bde-issue-'+inv.id);
    if(!issueEl?.value){skipped++;continue;}
    inv.issueDate=issueEl.value;
    const dueEl=document.getElementById('bde-due-'+inv.id);
    if(dueEl?.value){inv.dueDate=dueEl.value;}
    else{const d=new Date(inv.issueDate);d.setDate(d.getDate()+30);inv.dueDate=d.toISOString().slice(0,10);}
    try{await dbSaveInvoice(inv);saved++;}
    catch(err){errs++;console.error(err);}
  }
  closeModal();renderInvoices();
  alert(`Updated ${saved} invoice${saved!==1?'s':''}${skipped?`, skipped ${skipped} (no date entered)`:''}${errs?`, ${errs} error(s)`:''}.`);
}

async function renameCustomer(oldName,newName){
  newName=newName.trim();if(!newName||newName===oldName)return;
  const alreadyExists=customers.find(c=>c.name===newName);
  if(alreadyExists){if(!confirm(`"${newName}" already exists. Merge all POs from "${oldName}" into "${newName}"?`))return;}
  const {error}=await sb.from('pos').update({customer:newName}).eq('customer',oldName);
  if(error){alert('Error: '+error.message);return;}
  pos.forEach(p=>{if(p.customer===oldName)p.customer=newName;});
  if(!alreadyExists){await dbSaveCustomer(newName);customers.push({name:newName});}
  await dbDeleteCustomer(oldName);
  customers=customers.filter(c=>c.name!==oldName);
  customers.sort((a,b)=>a.name.localeCompare(b.name));
  renderLists();
}
async function deleteCustomer(name){
  if(pos.some(p=>p.customer===name)){alert(`Cannot delete "${name}" — active POs exist.`);return;}
  if(!confirm(`Delete "${name}"?`))return;
  await dbDeleteCustomer(name);customers=customers.filter(c=>c.name!==name);renderLists();
}
async function addCustomer(){
  const name=document.getElementById('new-cust-input')?.value.trim();
  if(!name){alert('Enter a name.');return;}
  if(customers.find(c=>c.name===name)){alert('Already exists.');return;}
  await dbSaveCustomer(name);customers.push({name});customers.sort((a,b)=>a.name.localeCompare(b.name));renderLists();
}
async function deleteSku(desc){
  if(!confirm(`Remove "${desc}"?`))return;
  await dbDeleteSku(desc);skus=skus.filter(s=>s.desc!==desc);renderLists();
}
async function addSku(){
  const desc=document.getElementById('new-sku-desc')?.value.trim();
  const unit=document.getElementById('new-sku-unit')?.value.trim()||'ea';
  const unitPrice=parseFloat(document.getElementById('new-sku-price')?.value)||0;
  const laborHours=parseFloat(document.getElementById('new-sku-labor')?.value)||0;
  if(!desc){alert('Enter a description.');return;}
  if(skus.find(s=>s.desc===desc)){alert('Already exists.');return;}
  await dbSaveSku({desc,unit,unitPrice,laborHours});
  skus.push({desc,unit,unitPrice,laborHours});
  renderLists();
}
async function updateSkuByIdx(i,field,val){
  const s=skus[i];if(!s)return;
  s[field]=val;
  try{await dbSaveSku(s);}
  catch(e){console.error('SKU save error',e);}
}
async function deleteSkuByIdx(i){
  const s=skus[i];if(!s)return;
  if(!confirm(`Remove "${s.desc}"?`))return;
  await dbDeleteSku(s.desc);skus.splice(i,1);renderLists();
}

function updateFulfillTotal(){

  document.querySelectorAll('.fulfill-qty').forEach(input=>{
    const qty=Math.min(parseInt(input.value)||0, parseInt(input.dataset.open)||0);
    const unitPrice=parseFloat(input.dataset.unitPrice)||0;
    const lineTotal=qty*unitPrice;
    total+=lineTotal;
    const lineId=input.dataset.lineId;
    const el=document.getElementById('fulfill-line-val-'+lineId);
    if(el) el.textContent=fmt(lineTotal);
  });
  const totalEl=document.getElementById('fulfill-total');
  if(totalEl) totalEl.textContent=fmt(total);
}

async function submitFulfillPO(){
  const po=pos.find(p=>p.id===_addPoId);if(!po)return;
  const shipDate=document.getElementById('m-ship-date').value;
  const invNum=document.getElementById('m-inv-num').value.trim();
  const btn=document.getElementById('fulfill-btn');
  if(btn){btn.disabled=true;btn.textContent='Saving...';}

  // Collect line quantities
  const linesToShip=[];
  let invoiceTotal=0;
  let hasError=false;

  document.querySelectorAll('.fulfill-qty').forEach(input=>{
    const qty=parseInt(input.value)||0;
    const lineId=input.dataset.lineId;
    const unitPrice=parseFloat(input.dataset.unitPrice)||0;
    const openQty=parseInt(input.dataset.open)||0;
    if(qty<0||qty>openQty){hasError=true;return;}
    if(qty>0){
      linesToShip.push({lineId,qty,unitPrice});
      invoiceTotal+=qty*unitPrice;
    }
  });

  if(hasError){alert('One or more quantities are invalid.');if(btn){btn.disabled=false;btn.textContent='Record shipment';}return;}
  if(!linesToShip.length){alert('Enter a quantity greater than 0 for at least one line.');if(btn){btn.disabled=false;btn.textContent='Record shipment';}return;}

  try{
    // Save a shipment record for each line
    for(const item of linesToShip){
      const l=po.lines.find(x=>x.id===item.lineId);if(!l)continue;
      const sh={date:shipDate,qty:item.qty,inv:invNum};
      await dbSaveShipment(po.id,item.lineId,sh);
      l.shipped.push(sh);
    }

    // Create ONE invoice record for the whole batch if invoice# provided
    if(invNum){
      const existing=invoices.find(i=>i.invoiceNumber===invNum);
      const issueDate=shipDate||new Date().toISOString().slice(0,10);
      const due=new Date(issueDate);due.setDate(due.getDate()+30);
      const inv={
        id:existing?.id,
        invoiceNumber:invNum,
        customer:po.customer,
        poId:po.id,
        soNumber:po.so||'',
        issueDate,
        dueDate:due.toISOString().slice(0,10),
        amount:Math.round(invoiceTotal*100)/100,
        notes:'',
        paid:existing?.paid||false,
        paidDate:existing?.paidDate||'',
        paidAmount:existing?.paidAmount||null,
        paidNotes:existing?.paidNotes||''
      };
      const saved=await dbSaveInvoice(inv);
      if(existing){Object.assign(existing,mapInvoice(saved));}
      else{invoices.unshift(mapInvoice(saved));}
    }

    closeModal();renderContent();
  }catch(e){
    alert('Error saving: '+e.message);
    if(btn){btn.disabled=false;btn.textContent='Record shipment';}
  }
}

async function submitAddPO(){

  const wo=document.getElementById('m-wo').value.trim();

  const id='PO-'+String((Math.max(0,...nums)+1)).padStart(3,'0');

    due:document.getElementById('m-due').value,commitDate:document.getElementById('m-commit').value,

async function submitAddLine(){
  const po=pos.find(p=>p.id===_addPoId);if(!po)return;
  const desc=document.getElementById('m-desc').value.trim();
  if(!desc){alert('Description is required.');return;}

  const line={id:'L'+(Math.max(0,...ids,0)+1),desc,qty:parseInt(document.getElementById('m-qty').value)||1,unit,unitPrice,shipped:[]};
